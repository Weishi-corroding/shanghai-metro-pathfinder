<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#0B1F3A"/>
  <text x="80" y="90" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="44" font-weight="700" fill="#FFFFFF" text-anchor="start">数据集建设 &amp; 图建模</text>
  <line x1="80" y1="110" x2="1200" y2="110" stroke="#E4002B" stroke-width="3" stroke-linecap="round"/>
  <text x="80" y="140" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="18" font-weight="400" fill="#FFD54F" text-anchor="start">对应课设：数据集 10 + 图拓扑 10 = 20 分</text>
  <rect x="60" y="175" width="340" height="130" rx="10" fill="#132846" stroke="#1E3A5F" stroke-width="2"/>
  <text x="80" y="210" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="22" font-weight="700" fill="#FFD54F" text-anchor="start">① Fetch</text>
  <text x="80" y="245" font-family="Consolas, 'Courier New', monospace" font-size="16" font-weight="400" fill="#DDEBFF" text-anchor="start">python fetch_all.py</text>
  <text x="80" y="270" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="16" font-weight="400" fill="#B7C7DE" text-anchor="start">Shanghai Metro API</text>
  <text x="80" y="295" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="14" font-weight="400" fill="#B7C7DE" text-anchor="start">→ metro_data/line-XX.csv</text>
  <rect x="460" y="175" width="340" height="130" rx="10" fill="#132846" stroke="#1E3A5F" stroke-width="2"/>
  <text x="480" y="210" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="22" font-weight="700" fill="#FFD54F" text-anchor="start">② Build</text>
  <text x="480" y="245" font-family="Consolas, 'Courier New', monospace" font-size="16" font-weight="400" fill="#DDEBFF" text-anchor="start">build_dataset (C++)</text>
  <text x="480" y="270" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="16" font-weight="400" fill="#B7C7DE" text-anchor="start">换乘拆分 · 边填补 · 环线去伪</text>
  <text x="480" y="295" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="14" font-weight="400" fill="#B7C7DE" text-anchor="start">→ Station.csv, Edge.csv</text>
  <rect x="860" y="175" width="340" height="130" rx="10" fill="#132846" stroke="#1E3A5F" stroke-width="2"/>
  <text x="880" y="210" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="22" font-weight="700" fill="#FFD54F" text-anchor="start">③ Visualize</text>
  <text x="880" y="245" font-family="Consolas, 'Courier New', monospace" font-size="16" font-weight="400" fill="#DDEBFF" text-anchor="start">fetch_station_coords.py</text>
  <text x="880" y="270" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="16" font-weight="400" fill="#B7C7DE" text-anchor="start">OSM Overpass 投影</text>
  <text x="880" y="295" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="14" font-weight="400" fill="#B7C7DE" text-anchor="start">→ layout.json</text>
  <line x1="400" y1="240" x2="460" y2="240" stroke="#E4002B" stroke-width="3" stroke-linecap="round"/>
  <polygon points="455,233 465,240 455,247" fill="#E4002B"/>
  <line x1="800" y1="240" x2="860" y2="240" stroke="#E4002B" stroke-width="3" stroke-linecap="round"/>
  <polygon points="855,233 865,240 855,247" fill="#E4002B"/>
  <rect x="60" y="360" width="500" height="230" rx="10" fill="#132846" stroke="#1E3A5F" stroke-width="2"/>
  <text x="80" y="395" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="22" font-weight="700" fill="#FFD54F" text-anchor="start">换乘节点拆分（例：人民广场）</text>
  <circle cx="160" cy="475" r="28" fill="#E4002B"/>
  <text x="160" y="483" font-family="Consolas, 'Courier New', monospace" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">0113</text>
  <text x="160" y="530" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="14" font-weight="400" fill="#B7C7DE" text-anchor="middle">1号线</text>
  <circle cx="310" cy="475" r="28" fill="#97D700"/>
  <text x="310" y="483" font-family="Consolas, 'Courier New', monospace" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">0213</text>
  <text x="310" y="530" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="14" font-weight="400" fill="#B7C7DE" text-anchor="middle">2号线</text>
  <circle cx="460" cy="475" r="28" fill="#0094D8"/>
  <text x="460" y="483" font-family="Consolas, 'Courier New', monospace" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">0816</text>
  <text x="460" y="530" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="14" font-weight="400" fill="#B7C7DE" text-anchor="middle">8号线</text>
  <line x1="188" y1="475" x2="282" y2="475" stroke="#B7C7DE" stroke-width="2" stroke-linecap="round" stroke-dasharray="6,4"/>
  <line x1="338" y1="475" x2="432" y2="475" stroke="#B7C7DE" stroke-width="2" stroke-linecap="round" stroke-dasharray="6,4"/>
  <path d="M 160 447 Q 310 405 460 447" fill="none" stroke="#B7C7DE" stroke-width="2"/>
  <text x="310" y="428" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="14" font-weight="400" fill="#B7C7DE" text-anchor="middle">换乘 t=5</text>
  <text x="80" y="570" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="14" font-weight="400" fill="#B7C7DE" text-anchor="start">同名站按线路拆成 3 节点 · 换乘边双向 · 边权=5min · line=换乘</text>
  <rect x="600" y="360" width="620" height="230" rx="10" fill="#132846" stroke="#1E3A5F" stroke-width="2"/>
  <text x="620" y="395" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="22" font-weight="700" fill="#FFD54F" text-anchor="start">特殊处理</text>
  <text x="620" y="430" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="18" font-weight="400" fill="#DDEBFF" text-anchor="start">▸ 4 号线环状：内圈/外圈方向标记（Line4Dir）</text>
  <text x="620" y="462" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="18" font-weight="400" fill="#DDEBFF" text-anchor="start">▸ 5/10/11 支线：3min 默认补边填补 Y 分叉</text>
  <text x="620" y="494" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="18" font-weight="400" fill="#DDEBFF" text-anchor="start">▸ remove_loop_closure_edges() 移除环线伪边</text>
  <text x="620" y="526" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="18" font-weight="400" fill="#DDEBFF" text-anchor="start">▸ UTF-8 BOM：utf-8-sig，中文 Excel 兼容</text>
  <text x="620" y="558" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="18" font-weight="400" fill="#DDEBFF" text-anchor="start">▸ StationManager 拆分同名站为独立 ID</text>
  <text x="640" y="660" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="20" font-weight="700" fill="#FFD54F" text-anchor="middle">530 物理站 → 800+ 图节点   ·   1044 边段 → 1300+ 有向边   ·   278 换乘边</text>
</svg>
