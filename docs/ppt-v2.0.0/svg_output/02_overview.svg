<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#0B1F3A"/>
  <text x="80" y="90" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="44" font-weight="700" fill="#FFFFFF" text-anchor="start">项目概览</text>
  <line x1="80" y1="110" x2="1200" y2="110" stroke="#E4002B" stroke-width="3" stroke-linecap="round"/>
  <text x="80" y="145" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="22" font-weight="400" fill="#B7C7DE" text-anchor="start">三大功能模块 · 系统数据规模</text>
  <rect x="80" y="180" width="380" height="260" rx="12" fill="#132846" stroke="#1E3A5F" stroke-width="2"/>
  <text x="100" y="220" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="28" font-weight="700" fill="#FFD54F" text-anchor="start">🗺️ 路径规划</text>
  <text x="100" y="280" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="20" font-weight="400" fill="#DDEBFF" text-anchor="start">最短时间 / 最少换乘</text>
  <text x="100" y="320" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="20" font-weight="400" fill="#DDEBFF" text-anchor="start">K 优路径（K=3）</text>
  <text x="100" y="360" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="20" font-weight="400" fill="#DDEBFF" text-anchor="start">换乘节点拆分</text>
  <text x="100" y="400" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="20" font-weight="400" fill="#DDEBFF" text-anchor="start">Dijkstra + Yen</text>
  <rect x="470" y="180" width="380" height="260" rx="12" fill="#132846" stroke="#1E3A5F" stroke-width="2"/>
  <text x="490" y="220" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="28" font-weight="700" fill="#FFD54F" text-anchor="start">⚙️ 运营管理</text>
  <text x="490" y="280" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="20" font-weight="400" fill="#DDEBFF" text-anchor="start">单站关闭/开启</text>
  <text x="490" y="320" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="20" font-weight="400" fill="#DDEBFF" text-anchor="start">批量 CSV 更新</text>
  <text x="490" y="360" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="20" font-weight="400" fill="#DDEBFF" text-anchor="start">恢复初始状态</text>
  <text x="490" y="400" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="20" font-weight="400" fill="#DDEBFF" text-anchor="start">闭站路径过滤</text>
  <rect x="860" y="180" width="380" height="260" rx="12" fill="#132846" stroke="#1E3A5F" stroke-width="2"/>
  <text x="880" y="220" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="28" font-weight="700" fill="#FFD54F" text-anchor="start">📊 网络分析</text>
  <text x="880" y="280" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="20" font-weight="400" fill="#DDEBFF" text-anchor="start">BFS 影响范围</text>
  <text x="880" y="320" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="20" font-weight="400" fill="#DDEBFF" text-anchor="start">DFS 连通分量</text>
  <text x="880" y="360" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="20" font-weight="400" fill="#DDEBFF" text-anchor="start">K 阶邻居</text>
  <text x="880" y="400" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="20" font-weight="400" fill="#DDEBFF" text-anchor="start">分量数变化检测</text>
  <rect x="60" y="490" width="180" height="130" rx="8" fill="#132846" stroke="#1E3A5F" stroke-width="2"/>
  <text x="150" y="545" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="32" font-weight="700" fill="#FFD54F" text-anchor="middle">20</text>
  <text x="150" y="585" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="16" font-weight="400" fill="#DDEBFF" text-anchor="middle">线路</text>
  <rect x="255" y="490" width="180" height="130" rx="8" fill="#132846" stroke="#1E3A5F" stroke-width="2"/>
  <text x="345" y="545" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="32" font-weight="700" fill="#FFD54F" text-anchor="middle">530+</text>
  <text x="345" y="585" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="16" font-weight="400" fill="#DDEBFF" text-anchor="middle">物理站</text>
  <rect x="450" y="490" width="180" height="130" rx="8" fill="#132846" stroke="#1E3A5F" stroke-width="2"/>
  <text x="540" y="545" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="32" font-weight="700" fill="#FFD54F" text-anchor="middle">800+</text>
  <text x="540" y="585" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="16" font-weight="400" fill="#DDEBFF" text-anchor="middle">图节点</text>
  <rect x="645" y="490" width="180" height="130" rx="8" fill="#132846" stroke="#1E3A5F" stroke-width="2"/>
  <text x="735" y="545" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="32" font-weight="700" fill="#FFD54F" text-anchor="middle">1300+</text>
  <text x="735" y="585" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="16" font-weight="400" fill="#DDEBFF" text-anchor="middle">有向边</text>
  <rect x="840" y="490" width="180" height="130" rx="8" fill="#132846" stroke="#1E3A5F" stroke-width="2"/>
  <text x="930" y="545" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="32" font-weight="700" fill="#FFD54F" text-anchor="middle">278</text>
  <text x="930" y="585" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="16" font-weight="400" fill="#DDEBFF" text-anchor="middle">换乘边</text>
  <rect x="1035" y="490" width="180" height="130" rx="8" fill="#132846" stroke="#1E3A5F" stroke-width="2"/>
  <text x="1125" y="545" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="32" font-weight="700" fill="#FFD54F" text-anchor="middle">41</text>
  <text x="1125" y="585" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="16" font-weight="400" fill="#DDEBFF" text-anchor="middle">测试通过</text>
  <text x="80" y="690" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="16" font-weight="400" fill="#91A9C8" text-anchor="start">~3,100 行 C++17 · 无第三方图库</text>
</svg>
